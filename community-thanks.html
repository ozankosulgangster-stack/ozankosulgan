<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joined OzzyPM Community</title>
    <meta
      name="description"
      content="Thank you for joining the OzzyPM community for practical project management ideas, templates, and delivery discussions."
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f6f3ec;
      }

      .thanks-card {
        width: min(720px, 100%);
        padding: 42px;
        border: 1px solid rgba(42, 33, 25, 0.12);
        border-radius: 28px;
        background: #fffaf1;
        box-shadow: 0 24px 70px rgba(34, 27, 18, 0.12);
      }

      .thanks-card h1 {
        margin: 0 0 16px;
        color: #1f2933;
        font-size: clamp(2.4rem, 7vw, 4.5rem);
        line-height: 0.95;
      }

      .thanks-card p {
        max-width: 560px;
        color: #5d5145;
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .thanks-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }
    </style>
  </head>
  <body>
    <main class="thanks-card">
      <p class="eyebrow">OzzyPM community</p>
      <h1>You are in.</h1>
      <p>
        Thanks for joining the OzzyPM community. You will get practical project management ideas, templates,
        and community updates as the platform grows.
      </p>
      <div class="thanks-actions">
        <a class="primary-button" href="/">Back to OzzyPM</a>
        <a class="secondary-button" href="/#sandbox">Explore the Sandbox</a>
      </div>
    </main>
  </body>
</html>
